<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>W_2_D_2</title>
    <style>
      label,
      input,
      button {
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <label for="num1">Number 1: </label><br />
    <input
      type="number"
      name=""
      id="number1"
      placeholder="Enter 1st Number"
    /><br />
    <label for="num2">Number 2: </label><br />
    <input
      type="number"
      name=""
      id="number2"
      placeholder="Enter 2st Number"
    /><br />
    <h3 id="operators"></h3>

    <button style="background-color: aqua" onclick="allOperators('+')">
      Add
    </button>
    <button
      style="background-color: rgb(0, 255, 119)"
      onclick="allOperators('-')"
    >
      Sub
    </button>
    <button
      style="background-color: rgb(255, 174, 0)"
      onclick="allOperators('*')"
    >
      Multiply
    </button>
    <button
      style="background-color: rgb(166, 0, 255)"
      onclick="allOperators('/')"
    >
      Division
    </button>

    <script src="/Week_2/day_2/index.js"></script>
  </body>
</html>
