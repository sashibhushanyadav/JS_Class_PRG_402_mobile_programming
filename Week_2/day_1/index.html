<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarksOfStudent</title>
    <style>
      input {
        margin-top: 5px;
      }
      button {
        margin-top: 5px;
        width: 80px;
        height: 30px;
        border-radius: 5px;
        color: wheat;
      }
    </style>
  </head>
  <body>
    <div>
      <label for="eng">English: </label
      ><input type="number" id="eng" placeholder="Enter english number" /><br />
      <label for="nep">Nepali: </label
      ><input type="number" id="nep" placeholder="Enter nepali number" /><br />
      <label for="c.math">C.Math: </label
      ><input
        type="number"
        id="c.math"
        placeholder="Enter c.math number"
      /><br />
      <label for="opt.math">Opt.Math: </label
      ><input
        type="number"
        id="opt.math"
        placeholder="Enter otp.math number"
      /><br />
      <label for="sci">Science: </label
      ><input type="number" id="sci" placeholder="Enter science number" /><br />
      <label for="eph">E.P.H: </label
      ><input type="number" id="eph" placeholder="Enter eph number" /><br />
      <label for="social">Social: </label
      ><input
        type="number"
        id="social"
        placeholder="Enter social number"
      /><br />
      <label for="acc">Account: </label
      ><input type="number" id="acc" placeholder="Enter account number" /><br />
      <h3 id="colorPrint"></h3>
      <button
        type="button"
        style="
          background-color: rgb(36, 57, 215);
          border: 3px solid rebeccapurple;
        "
        onclick="calculate()"
      >
        Result
      </button>
    </div>
    <script src="/Week_2/day_1/index.js"></script>
  </body>
</html>
