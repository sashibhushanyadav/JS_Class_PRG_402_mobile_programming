<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Profile Card</title>

    <style>
      #main-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
      }

      .card {
        background: white;
        width: 300px;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: scale(1.05);
      }

      .profile-img {
        width: 100%;
        height: 50%;
        border-radius: 10%;
        margin-bottom: 10px;
      }

      #student-name {
        font-size: 22px;
        font-weight: bold;
        color: #333;
      }

      .info {
        font-size: 14px;
        color: #666;
        margin: 5px 0;
      }

      .btn {
        margin-top: 15px;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background-color: #007bff;
        color: white;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .btn:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
